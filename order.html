<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>稲穂 発注入力</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px;}
.header{background:#fff;border-bottom:1px solid #e0e0e0;padding:10px 14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.08);display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:16px;font-weight:600;}
.ver{font-size:10px;color:#bbb;}
.meta-section{background:#fff;border-bottom:1px solid #e0e0e0;padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mf label{font-size:11px;color:#666;margin-bottom:3px;display:block;}
.mf select,.mf input{width:100%;font-size:13px;padding:7px 8px;border:1px solid #d0d0d0;border-radius:8px;background:#fafafa;color:#1a1a1a;-webkit-appearance:none;}
.mf input[type=date]{font-size:12px;}
.supplier-tabs{display:flex;gap:6px;padding:8px 14px;background:#fff;border-bottom:1px solid #e0e0e0;}
.sup-tab{flex:1;padding:8px 4px;font-size:13px;font-weight:600;border:1px solid #d0d0d0;border-radius:8px;background:#f8f8f8;color:#666;cursor:pointer;text-align:center;}
.sup-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.sup-tab .sup-cnt{font-size:10px;display:block;margin-top:1px;opacity:0.8;}
.store-section{background:#fff;border-bottom:1px solid #e0e0e0;padding:8px 14px;}
.store-tabs{display:flex;gap:5px;margin-bottom:8px;}
.store-tab{flex:1;padding:7px 4px;font-size:12px;font-weight:500;border:1px solid #d0d0d0;border-radius:8px;background:#f8f8f8;color:#666;cursor:pointer;text-align:center;}
.store-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.store-tab.has-data{border-color:#1565C0;color:#1565C0;}
.store-tab.active.has-data{background:#1565C0;color:#fff;border-color:#1565C0;}
.store-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-row{display:flex;gap:8px;margin-top:6px;}
.clear-store-btn{flex:1;padding:6px;font-size:11px;color:#e53935;border:1px solid #e53935;border-radius:8px;background:#fff;cursor:pointer;font-weight:600;}
.clear-all-btn2{flex:1;padding:6px;font-size:11px;color:#666;border:1px solid #d0d0d0;border-radius:8px;background:#fff;cursor:pointer;}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;}
.tab-btn{flex:1;padding:10px 6px;font-size:13px;color:#888;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;}
.tab-btn.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a;font-weight:600;}
.search-box{background:#fff;border-bottom:1px solid #e0e0e0;padding:8px 14px;}
.search-box input{width:100%;padding:8px 12px;border:1px solid #d0d0d0;border-radius:20px;font-size:14px;background:#f8f8f8;}
.filter-row{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;background:#fff;border-bottom:1px solid #e0e0e0;-webkit-overflow-scrolling:touch;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{padding:5px 13px;font-size:12px;border:1px solid #d0d0d0;border-radius:20px;background:none;color:#666;cursor:pointer;white-space:nowrap;}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.product-list{padding:0 14px;}
.product-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #efefef;}
.product-info{flex:1;min-width:0;}
.product-name{font-size:13px;line-height:1.4;word-break:break-all;}
.product-meta{font-size:11px;color:#999;margin-top:2px;}
.kubun-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;margin-right:4px;font-weight:500;}
.k1{background:#E3F2FD;color:#1565C0;}
.k6{background:#E8F5E9;color:#2E7D32;}
.ke{background:#FFF8E1;color:#E65100;}
.qty-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.qbtn{width:34px;height:34px;border:1px solid #d0d0d0;border-radius:8px;background:#f8f8f8;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qbtn:active{background:#e0e0e0;}
.qdsp{width:34px;text-align:center;font-size:15px;font-weight:500;color:#bbb;cursor:pointer;}
.qdsp.hv{color:#1565C0;}
.summary{position:sticky;bottom:0;background:#fff;border-top:1px solid #e0e0e0;padding:8px 14px;box-shadow:0 -2px 8px rgba(0,0,0,0.06);}
.sum-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.sum-store-name{font-size:12px;font-weight:600;color:#1a1a1a;}
.sum-vals{display:flex;gap:8px;}
.sum-item{font-size:12px;color:#666;}
.sum-item b{color:#1a1a1a;}
.sum-item .money{color:#1565C0;font-weight:600;}
.sum-all-row{display:flex;gap:10px;padding-top:4px;border-top:1px solid #efefef;margin-top:2px;}
.sum-all-item{font-size:11px;color:#888;}
.sum-all-item b{color:#555;}
.empty{text-align:center;padding:40px 14px;color:#aaa;font-size:13px;}
.conf-block{margin-bottom:12px;border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;}
.conf-block-title{background:#f5f5f5;padding:8px 12px;font-size:12px;font-weight:600;}
.conf-block-inner{padding:0 12px;}
.order-section-title{padding:6px 0 2px;font-size:11px;font-weight:600;color:#888;}
.order-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #efefef;}
.order-name{font-size:12px;flex:1;}
.order-meta-s{font-size:10px;color:#aaa;}
.order-right{text-align:right;flex-shrink:0;margin-left:8px;}
.order-qty{font-size:12px;font-weight:600;color:#1565C0;}
.order-price{font-size:10px;color:#aaa;}
.subtotal-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;color:#666;border-bottom:1px solid #eee;}
.total-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;font-weight:600;}
.action-btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px;}
.save-btn{background:#1a1a1a;color:#fff;}
.save-btn:disabled{background:#ccc;}
.mail-btn{background:#1565C0;color:#fff;display:none;}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #efefef;}
.h-store{font-size:13px;font-weight:500;}
.h-meta{font-size:11px;color:#aaa;margin-top:2px;}
.h-dl-btn{padding:5px 10px;font-size:11px;font-weight:500;background:#1565C0;color:#fff;border:none;border-radius:6px;cursor:pointer;}
.h-del-btn{padding:5px 8px;font-size:11px;color:#e53935;border:1px solid #e53935;border-radius:6px;background:none;cursor:pointer;margin-left:4px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:20px;width:min(300px,90vw);}
.modal h3{font-size:15px;font-weight:600;margin-bottom:4px;}
.modal-sub{font-size:12px;color:#888;margin-bottom:12px;line-height:1.5;}
.modal input[type=number]{width:100%;font-size:22px;text-align:center;padding:10px;border:1px solid #d0d0d0;border-radius:8px;margin-bottom:12px;}
.modal-btns{display:flex;gap:8px;}
.modal-btns button{flex:1;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
.mbtn-cancel{border:1px solid #d0d0d0;background:none;color:#666;}
.mbtn-ok{background:#1a1a1a;color:#fff;border:none;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;z-index:500;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
#tab-history{display:none;padding:0 14px;}
#tab-confirm{display:none;padding:0 14px;}
</style>
</head>
<body>
<div class="header"><h1>稲穂 発注入力</h1><span class="ver">ver 1.4</span></div>

<div class="meta-section">
  <div class="row2">
    <div class="mf"><label>発注日</label><input type="date" id="order-date"></div>
    <div class="mf"><label>&nbsp;</label>
      <button onclick="clearAll()" style="width:100%;padding:7px;font-size:12px;color:#e53935;border:1px solid #e53935;border-radius:8px;background:#fff;cursor:pointer;font-weight:600;">全クリア</button>
    </div>
  </div>
</div>

<div class="supplier-tabs">
  <button class="sup-tab active" id="sup-inaho" onclick="switchSupplier('inaho')">稲穂<span class="sup-cnt" id="sup-cnt-inaho">0品目</span></button>
  <button class="sup-tab" id="sup-sankyo" onclick="switchSupplier('sankyo')">三共<span class="sup-cnt" id="sup-cnt-sankyo">0品目</span></button>
</div>

<div class="store-section">
  <div class="store-tabs">
    <button class="store-tab active" id="stab-0" onclick="switchStore(0)">店舗1</button>
    <button class="store-tab" id="stab-1" onclick="switchStore(1)">店舗2</button>
    <button class="store-tab" id="stab-2" onclick="switchStore(2)">店舗3</button>
  </div>
  <div id="store-inputs-0" class="store-inputs">
    <div class="mf"><label>店舗名</label><input type="text" id="store-0" placeholder="店舗名" oninput="updateStoreTab(0)"></div>
    <div class="mf"><label>配送区分</label><select id="delivery-0"><option>稲穂のみ</option><option>直送</option><option>引き取り</option></select></div>
  </div>
  <div id="store-inputs-1" class="store-inputs" style="display:none;">
    <div class="mf"><label>店舗名</label><input type="text" id="store-1" placeholder="店舗名" oninput="updateStoreTab(1)"></div>
    <div class="mf"><label>配送区分</label><select id="delivery-1"><option>稲穂のみ</option><option>直送</option><option>引き取り</option></select></div>
  </div>
  <div id="store-inputs-2" class="store-inputs" style="display:none;">
    <div class="mf"><label>店舗名</label><input type="text" id="store-2" placeholder="店舗名" oninput="updateStoreTab(2)"></div>
    <div class="mf"><label>配送区分</label><select id="delivery-2"><option>稲穂のみ</option><option>直送</option><option>引き取り</option></select></div>
  </div>
  <div class="btn-row">
    <button class="clear-store-btn" onclick="clearCurrentStore()">この店舗をクリア</button>
    <button class="clear-all-btn2" onclick="clearAll()">全クリア</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('input')">商品入力</button>
  <button class="tab-btn" onclick="switchTab('confirm')">確認<span id="confirm-cnt"></span></button>
  <button class="tab-btn" onclick="switchTab('history')">履歴</button>
</div>

<div id="tab-input">
  <div class="search-box"><input type="text" id="search" placeholder="商品名・品番・コードで検索..." oninput="renderList()"></div>
  <div class="filter-row" id="filter-row"></div>
  <div class="product-list" id="product-list"></div>
</div>

<div id="tab-confirm">
  <div id="order-list" style="margin-bottom:4px;"></div>
  <div style="padding:10px 0 14px;">
    <button class="action-btn save-btn" id="save-btn" onclick="saveOrder()">保存 → Excelダウンロード</button>
    <button class="action-btn mail-btn" id="mail-btn" onclick="sendMail()">メールで送信</button>
  </div>
</div>

<div id="tab-history">
  <div id="history-list" style="padding-top:4px;"></div>
</div>

<div class="summary">
  <div class="sum-row">
    <div class="sum-store-name" id="sum-store-name">店舗1（稲穂）</div>
    <div class="sum-vals">
      <div class="sum-item"><b id="s-items">0</b>品目</div>
      <div class="sum-item"><b id="s-qty">0</b>個</div>
      <div class="sum-item">1000均:<span class="money" id="s-1000">¥0</span></div>
      <div class="sum-item">600均:<span class="money" id="s-600">¥0</span></div>
    </div>
  </div>
  <div class="sum-all-row">
    <div class="sum-all-item">全体:<b id="sa-qty">0</b>個</div>
    <div class="sum-all-item">稲穂計:<b id="sa-inaho">¥0</b></div>
    <div class="sum-all-item">三共計:<b id="sa-sankyo">¥0</b></div>
  </div>
</div>

<div class="overlay" id="modal-overlay">
  <div class="modal">
    <h3>数量を入力</h3>
    <div class="modal-sub" id="modal-pname"></div>
    <input type="number" id="modal-qty" min="0" inputmode="numeric" pattern="[0-9]*">
    <div class="modal-btns">
      <button class="mbtn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="mbtn-ok" onclick="confirmModal()">決定</button>
    </div>
  </div>
</div>

<div class="overlay" id="clear-overlay">
  <div class="modal">
    <h3>全クリア</h3>
    <div class="modal-sub">全取引先・全店舗の数量をリセットします。</div>
    <div class="modal-btns">
      <button class="mbtn-cancel" onclick="document.getElementById('clear-overlay').classList.remove('open')">キャンセル</button>
      <button style="flex:1;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:#e53935;color:#fff;border:none;" onclick="doClear()">クリア</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const qty = {inaho:{0:{},1:{},2:{}}, sankyo:{0:{},1:{},2:{}}};
let supplier = 'inaho';
let storeIdx = 0;
let filter = '全て';
let modalCode = null;

document.getElementById('order-date').value = new Date().toISOString().split('T')[0];

function switchSupplier(s) {
  supplier = s;
  filter = '全て';
  document.getElementById('sup-inaho').classList.toggle('active', s==='inaho');
  document.getElementById('sup-sankyo').classList.toggle('active', s==='sankyo');
  renderFilters(); renderList(); updateSummary();
}

function switchStore(i) {
  storeIdx = i;
  for(let j=0;j<3;j++){
    document.getElementById('stab-'+j).classList.toggle('active', j===i);
    document.getElementById('store-inputs-'+j).style.display = j===i?'grid':'none';
  }
  renderList(); updateSummary();
}

function updateStoreTab(i) {
  const name = document.getElementById('store-'+i).value.trim();
  document.getElementById('stab-'+i).textContent = name || ('店舗'+(i+1));
  refreshHasData(); updateSummary();
}

function refreshHasData() {
  for(let i=0;i<3;i++){
    const has = Object.keys(qty.inaho[i]).length>0 || Object.keys(qty.sankyo[i]).length>0;
    document.getElementById('stab-'+i).classList.toggle('has-data', has);
  }
}

function renderFilters() {
  const kubuns = [...new Set((PRODUCTS[supplier]||[]).map(function(p){return p.kubun;}))];
  document.getElementById('filter-row').innerHTML = ['全て'].concat(kubuns).map(function(k){
    return '<button class="filter-btn '+(k===filter?'active':'')+'" onclick="setFilter(\'' +k+ '\')">' +k+ '</button>';
  }).join('');
}

function setFilter(k) { filter=k; renderFilters(); renderList(); }

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = (PRODUCTS[supplier]||[]).slice();
  if(filter!=='全て') list=list.filter(function(p){return p.kubun===filter;});
  if(q) list=list.filter(function(p){return p.name.toLowerCase().indexOf(q)>=0||p.hiban.toLowerCase().indexOf(q)>=0||p.code.indexOf(q)>=0;});
  const el = document.getElementById('product-list');
  if(!list.length){el.innerHTML='<div class="empty">該当商品なし</div>';return;}
  const kc={'1000均':'k1','600均':'k6','EDLP':'ke','季節':'ke'};
  const rows = list.map(function(p){
    const price=PRICES[p.kubun]||0;
    const priceStr=price?' @'+price.toLocaleString()+'円':'';
    const v = qty[supplier][storeIdx][p.code] || 0;
    const hvClass = v ? 'hv' : '';
    const dispVal = v ? String(v) : '−';
    return '<div class="product-item">'
      +'<div class="product-info">'
      +'<div class="product-name"><span class="kubun-badge '+(kc[p.kubun]||'ke')+'">'+p.kubun+'</span>'+p.name+'</div>'
      +'<div class="product-meta">'+p.code+' / '+p.hiban+priceStr+'</div>'
      +'</div>'
      +'<div class="qty-ctrl">'
      +'<button class="qbtn" data-code="'+p.code+'" data-d="-1">−</button>'
      +'<div class="qdsp '+hvClass+'" data-code="'+p.code+'">'+dispVal+'</div>'
      +'<button class="qbtn" data-code="'+p.code+'" data-d="1">＋</button>'
      +'</div></div>';
  });
  el.innerHTML = rows.join('');
}

document.getElementById('product-list').addEventListener('click', function(e){
  const btn = e.target.closest('.qbtn');
  const dsp = e.target.closest('.qdsp');
  if(btn){ chg(btn.dataset.code, parseInt(btn.dataset.d)); }
  else if(dsp){ openModal(dsp.dataset.code); }
});

function chg(code, d) {
  const cur = qty[supplier][storeIdx][code]||0;
  const nxt = Math.max(0, cur+d);
  if(nxt===0) delete qty[supplier][storeIdx][code];
  else qty[supplier][storeIdx][code]=nxt;
  renderList(); updateSummary(); refreshHasData(); resetSaveBtn();
}

function openModal(code) {
  modalCode=code;
  const p=(PRODUCTS[supplier]||[]).find(function(x){return x.code===code;});
  const storeName=document.getElementById('store-'+storeIdx).value.trim()||('店舗'+(storeIdx+1));
  document.getElementById('modal-pname').textContent=(p?p.name+' ／ ':'')+storeName;
  const inp=document.getElementById('modal-qty');
  inp.value=qty[supplier][storeIdx][code]||'';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){inp.focus();},100);
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');modalCode=null;}
function confirmModal(){
  const v=parseInt(document.getElementById('modal-qty').value);
  if(modalCode){
    if(!v||v<=0) delete qty[supplier][storeIdx][modalCode];
    else qty[supplier][storeIdx][modalCode]=v;
  }
  closeModal(); renderList(); updateSummary(); refreshHasData(); resetSaveBtn();
}
document.getElementById('modal-qty').addEventListener('keydown',function(e){if(e.key==='Enter')confirmModal();});
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===document.getElementById('modal-overlay'))closeModal();});

function clearCurrentStore(){
  qty.inaho[storeIdx]={}; qty.sankyo[storeIdx]={};
  renderList(); updateSummary(); refreshHasData(); resetSaveBtn();
  showToast('この店舗をクリアしました');
}
function clearAll(){document.getElementById('clear-overlay').classList.add('open');}
function doClear(){
  for(let i=0;i<3;i++){qty.inaho[i]={};qty.sankyo[i]={};}
  document.getElementById('clear-overlay').classList.remove('open');
  renderList(); updateSummary(); refreshHasData(); resetSaveBtn();
  showToast('全クリアしました');
}

function updateSummary(){
  const products=PRODUCTS[supplier]||[];
  let items=0,totalQty=0,amt1000=0,amt600=0;
  const curQty=qty[supplier][storeIdx];
  for(const code in curQty){
    const q=curQty[code];
    const p=products.find(function(x){return x.code===code;});
    if(!p) continue;
    items++; totalQty+=q;
    if(p.kubun==='1000均') amt1000+=q*700;
    else if(p.kubun==='600均') amt600+=q*390;
  }
  const storeName=document.getElementById('store-'+storeIdx).value.trim()||('店舗'+(storeIdx+1));
  const supName=supplier==='inaho'?'稲穂':'三共';
  document.getElementById('sum-store-name').textContent=storeName+'（'+supName+'）';
  document.getElementById('s-items').textContent=items;
  document.getElementById('s-qty').textContent=totalQty;
  document.getElementById('s-1000').textContent='¥'+amt1000.toLocaleString();
  document.getElementById('s-600').textContent='¥'+amt600.toLocaleString();

  let allQty=0,allInaho=0,allSankyo=0;
  ['inaho','sankyo'].forEach(function(sup){
    const prods=PRODUCTS[sup]||[];
    for(let i=0;i<3;i++){
      for(const code in qty[sup][i]){
        const q=qty[sup][i][code];
        const p=prods.find(function(x){return x.code===code;});
        if(!p) continue;
        allQty+=q;
        const amt=q*(PRICES[p.kubun]||0);
        if(sup==='inaho') allInaho+=amt; else allSankyo+=amt;
      }
    }
  });
  document.getElementById('sa-qty').textContent=allQty;
  document.getElementById('sa-inaho').textContent='¥'+allInaho.toLocaleString();
  document.getElementById('sa-sankyo').textContent='¥'+allSankyo.toLocaleString();

  ['inaho','sankyo'].forEach(function(sup){
    const s=new Set();
    for(let i=0;i<3;i++) Object.keys(qty[sup][i]).forEach(function(c){s.add(c);});
    document.getElementById('sup-cnt-'+sup).textContent=s.size+'品目';
  });
}

function switchTab(tab){
  ['input','confirm','history'].forEach(function(t,i){
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
    document.querySelectorAll('.tab-btn')[i].classList.toggle('active',t===tab);
  });
  if(tab==='confirm') renderConfirm();
  if(tab==='history') loadHistory();
}

function renderConfirm(){
  const date=document.getElementById('order-date').value;
  let html='';
  ['inaho','sankyo'].forEach(function(sup){
    const products=PRODUCTS[sup]||[];
    const supName=sup==='inaho'?'稲穂':'三共';
    let supHtml='',supGrandQty=0,supGrandAmt=0;
    for(let si=0;si<3;si++){
      const codes=Object.keys(qty[sup][si]);
      if(!codes.length) continue;
      const storeName=document.getElementById('store-'+si).value.trim()||('店舗'+(si+1));
      const delivery=document.getElementById('delivery-'+si).value;
      const byK={};
      codes.forEach(function(code){
        const p=products.find(function(x){return x.code===code;}); if(!p) return;
        if(!byK[p.kubun]) byK[p.kubun]=[];
        byK[p.kubun].push(p);
      });
      if(!Object.keys(byK).length) continue;
      let storeQty=0,storeAmt=0;
      let sh='<div style="padding:6px 0 2px;font-size:12px;font-weight:600;color:#1565C0;">'+storeName+'（'+delivery+'）</div>';
      for(const k in byK){
        const price=PRICES[k]||0;
        sh+='<div class="order-section-title">'+k+(price?' @'+price.toLocaleString()+'円':'')+'</div>';
        let kQty=0,kAmt=0;
        byK[k].forEach(function(p){
          const q=qty[sup][si][p.code]; if(!q) return;
          const amt=(PRICES[p.kubun]||0)*q;
          kQty+=q; kAmt+=amt; storeQty+=q; storeAmt+=amt;
          sh+='<div class="order-item">'
            +'<div><div class="order-name">'+p.name+'</div><div class="order-meta-s">'+p.code+'</div></div>'
            +'<div class="order-right"><div class="order-qty">'+q+'個</div>'+(amt?'<div class="order-price">¥'+amt.toLocaleString()+'</div>':'')+'</div>'
            +'</div>';
        });
        sh+='<div class="subtotal-row"><span>'+k+'小計</span><span>'+kQty+'個'+(kAmt?' / ¥'+kAmt.toLocaleString():'')+'</span></div>';
      }
      sh+='<div class="subtotal-row" style="font-weight:600;"><span>'+storeName+'合計</span><span>'+storeQty+'個'+(storeAmt?' / ¥'+storeAmt.toLocaleString():'')+'</span></div>';
      supHtml+=sh; supGrandQty+=storeQty; supGrandAmt+=storeAmt;
    }
    if(!supHtml) return;
    html+='<div class="conf-block">'
      +'<div class="conf-block-title">【'+supName+'】'+date+'　合計 '+supGrandQty+'個'+(supGrandAmt?' / ¥'+supGrandAmt.toLocaleString():'')+'</div>'
      +'<div class="conf-block-inner">'+supHtml
      +'<div class="total-row"><span>【'+supName+'】総合計</span><span>'+supGrandQty+'個'+(supGrandAmt?' / ¥'+supGrandAmt.toLocaleString():'')+'</span></div>'
      +'</div></div>';
  });
  document.getElementById('order-list').innerHTML=html||'<div class="empty">数量が入力されていません</div>';
}

function resetSaveBtn(){
  const btn=document.getElementById('save-btn');
  btn.disabled=false; btn.textContent='保存 → Excelダウンロード';
  btn.onclick=saveOrder;
  document.getElementById('mail-btn').style.display='none';
}

async function saveOrder(){
  const hasData=['inaho','sankyo'].some(function(s){return [0,1,2].some(function(i){return Object.keys(qty[s][i]).length>0;});});
  if(!hasData){showToast('数量を入力してください');return;}
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='保存中...';
  const payload={
    date:document.getElementById('order-date').value,
    stores:[0,1,2].map(function(i){return {name:document.getElementById('store-'+i).value.trim(),delivery:document.getElementById('delivery-'+i).value};}),
    quantities:{inaho:[qty.inaho[0],qty.inaho[1],qty.inaho[2]],sankyo:[qty.sankyo[0],qty.sankyo[1],qty.sankyo[2]]}
  };
  try{
    const res=await fetch(SERVER+'/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    window._lastId=data.id;
    showToast('保存しました！');
    btn.disabled=false; btn.textContent='Excelダウンロード';
    btn.onclick=function(){downloadExcel(data.id);};
    document.getElementById('mail-btn').style.display='block';
    downloadExcel(data.id);
  }catch(e){showToast('保存失敗');btn.disabled=false;btn.textContent='保存 → Excelダウンロード';btn.onclick=saveOrder;}
}

function downloadExcel(id){
  const a=document.createElement('a');
  a.href=SERVER+'/orders/'+(id||window._lastId)+'/excel';
  a.download='発注書.xlsx'; a.click();
  showToast('Excelをダウンロード中...');
}

async function sendMail(){
  if(!window._lastId){showToast('先に保存してください');return;}
  const btn=document.getElementById('mail-btn');
  btn.textContent='送信中...'; btn.disabled=true;
  try{
    const res=await fetch(SERVER+'/orders/'+window._lastId+'/mail',{method:'POST'});
    const data=await res.json();
    showToast(data.success?'メールを送信しました！':'送信失敗');
  }catch(e){showToast('送信エラー');}
  btn.textContent='メールで送信'; btn.disabled=false;
}

async function loadHistory(){
  const el=document.getElementById('history-list');
  el.innerHTML='<div class="empty">読み込み中...</div>';
  try{
    const orders=await(await fetch(SERVER+'/orders')).json();
    if(!orders.length){el.innerHTML='<div class="empty">履歴なし</div>';return;}
    orders.sort(function(a,b){return b.created_at.localeCompare(a.created_at);});
    el.innerHTML=orders.map(function(o){
      const d=new Date(o.created_at).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
      const names=(o.stores||[]).filter(function(s){return s.name;}).map(function(s){return s.name;}).join('・')||'(未入力)';
      return '<div class="history-item">'
        +'<div><div class="h-store">'+names+'</div><div class="h-meta">'+(o.date||'')+' '+d+'</div></div>'
        +'<div>'
        +'<button class="h-dl-btn" data-id="'+o.id+'">DL</button>'
        +'<button class="h-del-btn" data-id="'+o.id+'">削除</button>'
        +'</div></div>';
    }).join('');
  }catch(e){el.innerHTML='<div class="empty">読み込みエラー</div>';}
}

document.getElementById('history-list').addEventListener('click',function(e){
  const dl=e.target.closest('.h-dl-btn');
  const del=e.target.closest('.h-del-btn');
  if(dl) downloadExcel(dl.dataset.id);
  else if(del) delHistory(del.dataset.id);
});

async function delHistory(id){
  if(!confirm('削除しますか？')) return;
  try{await fetch(SERVER+'/orders/'+id,{method:'DELETE'});loadHistory();showToast('削除しました');}
  catch(e){showToast('削除エラー');}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

renderFilters(); renderList(); updateSummary();
