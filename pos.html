<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>POSレジ</title>
<!-- html5-qrcode ライブラリ（iOS Safari実績あり） -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  input, select, textarea { font-size: 16px; } /* iOSズーム防止 */
  html { touch-action: manipulation; }
  :root {
    --indigo: #4f46e5;
    --teal: #0d9488;
    --red: #ef4444;
    --green: #22c55e;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: #e2e8f0;
    --text: #0f172a;
    --text2: #64748b;
    --text3: #94a3b8;
  }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, 'Hiragino Sans', sans-serif; background: var(--surface2); color: var(--text); }
  #app { display: flex; height: 100vh; height: 100dvh; overflow: hidden; }

  /* CART PANEL */
  #cart-panel { display: flex; flex-direction: column; width: 52%; border-right: 1px solid var(--border); background: var(--surface); }
  .panel-header { display: flex; align-items: center; gap: 8px; padding: 12px 16px; color: white; font-weight: 700; font-size: 15px; flex-shrink: 0; }
  #cart-header { background: var(--teal); }
  #scan-header { background: var(--indigo); }
  .panel-header .spacer { flex: 1; }
  .btn-sm { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 12px; padding: 4px 8px; border-radius: 6px; cursor: pointer; }

  #cart-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .empty-cart { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--text3); }
  .empty-cart svg { width: 48px; height: 48px; }
  .cart-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 12px; font-weight: 600; white-space: normal; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.3; }
  .cart-item-model { font-size: 10px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-unit { font-size: 10px; color: var(--text2); }
  .qty-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .qty-btn { width: 44px; height: 44px; border: none; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; font-weight: 700; -webkit-tap-highlight-color: rgba(0,0,0,0.1); }
  .qty-btn.minus { background: #fee2e2; color: var(--red); }
  .qty-btn.plus { background: #ccfbf1; color: var(--teal); }
  .qty-num { font-size: 13px; font-weight: 700; min-width: 20px; text-align: center; }
  .cart-item-subtotal { font-size: 12px; font-weight: 700; min-width: 54px; text-align: right; flex-shrink: 0; }
  .price-edit-btn { background: none; border: 1px dashed var(--border); border-radius: 4px; color: var(--text2); font-size: 10px; padding: 1px 3px; cursor: pointer; flex-shrink: 0; }
  .price-edit-btn:active { background: var(--surface2); }
  .price-input { width: 60px; font-size: 12px; font-weight: 700; border: 2px solid var(--indigo); border-radius: 6px; padding: 2px 4px; text-align: right; color: var(--indigo); }

  #summary { flex-shrink: 0; padding: 10px 12px; background: var(--surface2); border-top: 1px solid var(--border); }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 13px; }
  .summary-row.total { font-size: 16px; font-weight: 700; padding: 6px 0; border-top: 1px solid var(--border); margin-top: 4px; }
  .summary-row.total span:last-child { color: var(--teal); }
  .summary-row .label { color: var(--text2); }
  .received-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; cursor: pointer; }
  .received-row .label { font-size: 13px; font-weight: 600; color: var(--text2); }
  .received-val { font-size: 16px; font-weight: 700; }
  .received-val.active { color: var(--teal); }
  #change-box { display: none; background: #f0fdf4; border-radius: 10px; padding: 8px 12px; margin-top: 6px; }
  #change-box.negative { background: #fef2f2; }
  .change-label { font-size: 13px; font-weight: 700; }
  .change-amount { font-size: 22px; font-weight: 800; }
  .change-amount.positive { color: var(--green); }
  .change-amount.negative { color: var(--red); }
  #btn-checkout { width: 100%; padding: 14px; background: var(--teal); color: white; font-size: 15px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  #btn-checkout:disabled { background: var(--text3); cursor: not-allowed; }

  /* SCAN PANEL */
  #scan-panel { display: flex; flex-direction: column; width: 48%; background: var(--surface); overflow: hidden; }
  #camera-area { position: relative; height: 180px; flex-shrink: 0; background: #000; overflow: hidden; }
  #camera-video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #camera-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; }
  #btn-scan-start { display: flex; flex-direction: column; align-items: center; gap: 8px; color: white; background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 700; }
  #btn-scan-start svg { width: 40px; height: 40px; }
  #btn-scan-cancel { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 8px; padding: 8px 20px; font-size: 13px; font-weight: 700; cursor: pointer; display: none; }
  #scan-status { font-size: 11px; color: rgba(255,255,255,0.9); position: absolute; top: 6px; left: 8px; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px; }
  #debug-box { font-size: 11px; color: #64748b; padding: 4px 8px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; min-height: 20px; }
  #ver-box { font-size: 10px; color: rgba(255,255,255,0.7); font-weight: 400; }

  #scan-result { padding: 10px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); flex-shrink: 0; min-height: 70px; }
  .result-idle { color: var(--text3); font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .result-found { display: none; }
  .result-found .badge { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 2px; }
  .result-found .prod-name { font-size: 15px; font-weight: 700; }
  .result-found .prod-model { font-size: 12px; color: var(--text2); }
  .result-found .prod-price { font-size: 18px; font-weight: 800; color: var(--indigo); }
  .result-notfound { display: none; }
  .result-notfound .badge { font-size: 12px; font-weight: 700; color: var(--red); }
  .result-notfound .code { font-size: 12px; color: var(--text2); }

  #numpad-area { flex: 1; padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
  .mode-tabs { display: flex; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .mode-tab { flex: 1; padding: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
  .mode-tab.jan { background: var(--surface2); color: var(--text); }
  .mode-tab.jan.active { background: var(--indigo); color: white; }
  .mode-tab.received { background: var(--surface2); color: var(--text); }
  .mode-tab.received.active { background: var(--teal); color: white; }
  .mode-tab.manual { background: var(--surface2); color: var(--text); }
  .mode-tab.manual.active { background: #7c3aed; color: white; }
  .input-display { display: flex; align-items: center; gap: 8px; padding: 4px 2px; flex-shrink: 0; }
  .input-val { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .input-val.placeholder { color: var(--text3); font-weight: 400; }
  #btn-enter { background: var(--indigo); color: white; border: none; border-radius: 8px; padding: 6px 10px; cursor: pointer; flex-shrink: 0; }
  #btn-enter svg { width: 18px; height: 18px; display: block; }
  .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; flex: 1; }
  .np-btn { border: none; border-radius: 8px; background: var(--surface2); font-size: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .np-btn:active { background: #cbd5e1; }
  .np-btn.clear { background: #fee2e2; color: var(--red); }
  .np-btn.clear:active { background: #fca5a5; }

  /* MODAL */
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  #modal-overlay.open { display: flex; }
  #modal { background: white; border-radius: 16px; padding: 20px; width: 90%; max-width: 480px; max-height: 80vh; display: flex; flex-direction: column; gap: 12px; }
  #modal h2 { font-size: 18px; font-weight: 800; }
  #modal-list { flex: 1; overflow-y: auto; font-size: 13px; }
  #modal-list table { width: 100%; border-collapse: collapse; }
  #modal-list th { text-align: left; padding: 6px 4px; border-bottom: 2px solid var(--border); font-size: 12px; color: var(--text2); }
  #modal-list td { padding: 5px 4px; border-bottom: 1px solid var(--border); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
  #btn-export { background: var(--indigo); color: white; }
  #btn-modal-close { background: var(--surface2); color: var(--text); }

  /* PRICE SETTING MODAL */
  #price-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  #price-modal-overlay.open { display: flex; }
  #price-modal { background: white; border-radius: 16px; padding: 20px; width: 92%; max-width: 400px; display: flex; flex-direction: column; gap: 16px; }
  #price-modal h2 { font-size: 17px; font-weight: 800; }
  .price-tier { background: var(--surface2); border-radius: 12px; padding: 14px; }
  .price-tier-label { font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 8px; }
  .price-tier-row { display: flex; align-items: center; gap: 8px; }
  .price-tier-row span { font-size: 14px; color: var(--text2); }
  .price-tier-input { width: 90px; font-size: 18px; font-weight: 700; border: 2px solid var(--border); border-radius: 8px; padding: 6px 8px; text-align: right; }
  .price-tier-input:focus { border-color: var(--indigo); outline: none; }
  .price-reset-btn { font-size: 12px; color: var(--text2); background: white; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; margin-left: auto; }
  .price-modal-btns { display: flex; gap: 8px; }
  .price-modal-btns button { flex: 1; padding: 13px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
  #btn-price-apply { background: var(--teal); color: white; }
  #btn-price-close { background: var(--surface2); color: var(--text); }
  .price-note { font-size: 11px; color: var(--text3); text-align: center; }
</style>
</head>
<body>
<div id="app">
  <!-- LEFT: Cart Panel -->
  <div id="cart-panel">
    <div class="panel-header" id="cart-header">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      会計 <span id="ver-box"></span>
      <span class="spacer"></span>
      <button class="btn-sm" onclick="openPriceModal()">金額設定</button>
      &nbsp;
      <button class="btn-sm" onclick="openSalesModal()">売上履歴</button>
      &nbsp;
      <button class="btn-sm" onclick="clearCart()">クリア</button>
    </div>
    <div id="cart-list">
      <div class="empty-cart" id="empty-msg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span>商品をスキャンしてください</span>
      </div>
    </div>
    <div id="summary">
      <div style="display:flex;gap:6px;margin-bottom:6px;flex-shrink:0;">
        <button onclick="setTax(0)" id="tax-btn-0" style="flex:1;padding:5px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:#0d9488;color:white;">税なし</button>
        <button onclick="setTax(10)" id="tax-btn-10" style="flex:1;padding:5px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:#f1f5f9;color:#0f172a;">10%</button>
      </div>
      <div class="summary-row"><span class="label">小計（税抜）</span><span id="subtotal">¥0</span></div>
      <div class="summary-row" id="tax-row" style="display:none;"><span class="label" id="tax-label">消費税（10%）</span><span id="tax">¥0</span></div>
      <div class="summary-row total"><span>合計</span><span id="total">¥0</span></div>
      <div class="received-row" onclick="setMode('received')">
        <span class="label">預かり金</span>
        <span class="received-val" id="received-display">¥0</span>
      </div>
      <div id="change-box">
        <div class="change-label">お釣り</div>
        <div class="change-amount" id="change-amount">¥0</div>
      </div>
      <button id="btn-checkout" disabled onclick="checkout()">
        会計完了・次の客へ
      </button>
    </div>
  </div>

  <!-- RIGHT: Scan Panel -->
  <div id="scan-panel">
    <div class="panel-header" id="scan-header">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9V6a2 2 0 0 1 2-2h3M15 4h3a2 2 0 0 1 2 2v3M21 15v3a2 2 0 0 1-2 2h-3M9 20H6a2 2 0 0 1-2-2v-3"/><rect x="7" y="7" width="10" height="10"/></svg>
      バーコードスキャン
    </div>

    <div id="camera-area">
      <div id="camera-video-container" style="width:100%;height:100%;"></div>
      <div id="camera-overlay">
        <button id="btn-scan-start" onclick="startCamera()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9V6a2 2 0 0 1 2-2h3M15 4h3a2 2 0 0 1 2 2v3M21 15v3a2 2 0 0 1-2 2h-3M9 20H6a2 2 0 0 1-2-2v-3"/><rect x="7" y="7" width="10" height="10"/></svg>
          スキャン開始
        </button>
      </div>
      <span id="scan-status"></span>
      <button id="btn-scan-cancel" onclick="stopCamera()">キャンセル</button>
    </div>

    <div id="scan-result">
      <div class="result-idle" id="result-idle">
        スキャンしてください
      </div>
      <div class="result-found" id="result-found">
        <div class="badge">✓ 追加しました</div>
        <div class="prod-name" id="res-name"></div>
        <div class="prod-model" id="res-model"></div>
        <div class="prod-price" id="res-price"></div>
      </div>
      <div class="result-notfound" id="result-notfound">
        <div class="badge">✗ 見つかりません　→ 価格を選んで追加</div>
        <div class="code" id="res-code"></div>
        <div id="quick-price-btns" style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
          <button onclick="addUnknownItem(600)"  style="flex:1;padding:8px 4px;background:#ccfbf1;color:#0d9488;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">¥600</button>
          <button onclick="addUnknownItem(1000)" style="flex:1;padding:8px 4px;background:#e0e7ff;color:#4f46e5;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">¥1,000</button>
          <button onclick="addUnknownItem(2000)" style="flex:1;padding:8px 4px;background:#fef9c3;color:#ca8a04;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">¥2,000</button>
          <button onclick="addUnknownItem(null)" style="flex:1;padding:8px 4px;background:#f1f5f9;color:#64748b;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">その他</button>
        </div>
      </div>
    </div>

    <div id="numpad-area">
      <div class="mode-tabs">
        <button class="mode-tab jan" onclick="setMode('jan')">JANコード</button>
        <button class="mode-tab received active" onclick="setMode('received')">預かり金</button>
        <button class="mode-tab manual" onclick="setMode('manual')">手入力</button>
      </div>
      <div class="input-display">
        <span class="input-val" id="input-display">¥0</span>
        <button id="btn-enter" onclick="submitJAN()" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
        </button>
      </div>
      <div id="manual-form" style="display:none; padding:4px 0; flex-shrink:0;">
        <input id="manual-name" type="text" placeholder="商品名" style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;margin-bottom:6px;box-sizing:border-box;">
        <div style="display:flex;gap:6px;align-items:center;">
          <span style="font-size:14px;color:#64748b;">金額:</span>
          <span id="manual-price-display" style="font-size:18px;font-weight:700;flex:1;">¥0</span>
          <button onclick="addManualItem()" style="background:#4f46e5;color:white;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;">追加</button>
        </div>
      </div>
      <div class="numpad-grid">
        <button class="np-btn" onclick="numKey('7')">7</button>
        <button class="np-btn" onclick="numKey('8')">8</button>
        <button class="np-btn" onclick="numKey('9')">9</button>
        <button class="np-btn" onclick="numKey('4')">4</button>
        <button class="np-btn" onclick="numKey('5')">5</button>
        <button class="np-btn" onclick="numKey('6')">6</button>
        <button class="np-btn" onclick="numKey('1')">1</button>
        <button class="np-btn" onclick="numKey('2')">2</button>
        <button class="np-btn" onclick="numKey('3')">3</button>
        <button class="np-btn clear" onclick="numKey('C')">C</button>
        <button class="np-btn" onclick="numKey('0')">0</button>
        <button class="np-btn" onclick="numKey('⌫')">⌫</button>
      </div>
    </div>
  </div>
</div>

<!-- Price Setting Modal -->
<div id="price-modal-overlay" onclick="if(event.target===this)closePriceModal()">
  <div id="price-modal">
    <h2>💴 金額設定</h2>
    <div class="price-tier">
      <div class="price-tier-label">600円均一の販売価格</div>
      <div class="price-tier-row">
        <span>¥</span>
        <input class="price-tier-input" id="price-input-600" type="number" value="600" min="0" inputmode="numeric">
        <button class="price-reset-btn" onclick="document.getElementById('price-input-600').value=600">リセット</button>
      </div>
    </div>
    <div class="price-tier">
      <div class="price-tier-label">1,000円均一の販売価格</div>
      <div class="price-tier-row">
        <span>¥</span>
        <input class="price-tier-input" id="price-input-1000" type="number" value="1000" min="0" inputmode="numeric">
        <button class="price-reset-btn" onclick="document.getElementById('price-input-1000').value=1000">リセット</button>
      </div>
    </div>
    <div class="price-tier">
      <div class="price-tier-label">2,000円均一の販売価格</div>
      <div class="price-tier-row">
        <span>¥</span>
        <input class="price-tier-input" id="price-input-2000" type="number" value="2000" min="0" inputmode="numeric">
        <button class="price-reset-btn" onclick="document.getElementById('price-input-2000').value=2000">リセット</button>
      </div>
    </div>
    <p class="price-note">変更するとカート内の商品にも反映されます</p>
    <div class="price-modal-btns">
      <button id="btn-price-apply" onclick="applyPriceSettings()">適用する</button>
      <button id="btn-price-close" onclick="closePriceModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- Sales Modal -->
<div id="modal-overlay" onclick="if(event.target===this)closeSalesModal()">
  <div id="modal">
    <h2>本日の売上履歴</h2>
    <div id="modal-list"><p style="color:#94a3b8;font-size:13px">まだ売上がありません</p></div>
    <div class="modal-btns">
      <button id="btn-export" onclick="exportCSV()">CSVで出力</button>
      <button id="btn-modal-close" onclick="closeSalesModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
// ===== PRODUCT DATA =====
const PRODUCTS = {
  "4534587181013": { jan:"4534587181013", name:"ﾌﾞﾗｯｸﾀｲｶﾞｰ125X28P", model:"MAT-BT-125", price:1000 },

// ===== PRICE SETTINGS =====
// 各均一価格帯の現在の販売価格（デフォルトは定価）
let priceSettings = { 600: 600, 1000: 1000, 2000: 2000 };

function openPriceModal() {
  document.getElementById('price-input-600').value = priceSettings[600];
  document.getElementById('price-input-1000').value = priceSettings[1000];
  document.getElementById('price-input-2000').value = priceSettings[2000];
  document.getElementById('price-modal-overlay').classList.add('open');
}

function closePriceModal() {
  document.getElementById('price-modal-overlay').classList.remove('open');
}

function applyPriceSettings() {
  const new600  = parseInt(document.getElementById('price-input-600').value)  || 600;
  const new1000 = parseInt(document.getElementById('price-input-1000').value) || 1000;
  const new2000 = parseInt(document.getElementById('price-input-2000').value) || 2000;

  // カート内の商品も更新（元の定価ベースで対応する価格帯を判定）
  cart.forEach(item => {
    const basePrices = Object.keys(PRODUCTS).map(k => PRODUCTS[k])
      .find(p => p.jan === item.jan);
    const origPrice = basePrices ? basePrices.price : item.price;
    if (origPrice === 600)  item.price = new600;
    else if (origPrice === 1000) item.price = new1000;
    else if (origPrice === 2000) item.price = new2000;
  });

  priceSettings = { 600: new600, 1000: new1000, 2000: new2000 };
  closePriceModal();
  renderCart();
  renderSummary();
}

try { salesLog = JSON.parse(localStorage.getItem('salesLog') || '[]'); } catch(e) {}
let taxRate = 0;
let cameraStream = null;
let lastScanTime = 0;

// ===== CAMERA =====
let html5QrCode = null;

async function startCamera() {
  document.getElementById('scan-status').textContent = '起動中...';
  document.getElementById('camera-overlay').style.display = 'none';
  document.getElementById('btn-scan-cancel').style.display = 'block';
  try {
    html5QrCode = new Html5Qrcode('camera-video-container');
    await html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 15 },
      (decodedText) => {
        const now = Date.now();
        if (now - lastScanTime < 1500) return;
        lastScanTime = now;
        handleScannedCode(decodedText);
      },
      () => {}
    );
    document.getElementById('scan-status').textContent = 'スキャン中...';
  } catch(e) {
    document.getElementById('camera-overlay').style.display = 'flex';
    document.getElementById('btn-scan-cancel').style.display = 'none';
    document.getElementById('scan-status').textContent = '';
    alert('カメラエラー: ' + e);
  }
}

async function stopCamera() {
  if (html5QrCode) {
    try { await html5QrCode.stop(); html5QrCode.clear(); } catch(e) {}
    html5QrCode = null;
  }
  document.getElementById('camera-overlay').style.display = 'flex';
  document.getElementById('btn-scan-cancel').style.display = 'none';
  document.getElementById('scan-status').textContent = '';
}

// ===== BEEP =====
function beep(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (type === 'ok') {
      // 成功：レジっぽい短いピッ
      osc.frequency.setValueAtTime(1200, ctx.currentTime);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.12);
    } else {
      // 失敗：低めのブー
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    }
  } catch(e) {}
}

// ===== SCAN LOGIC =====
function handleScannedCode(code) {
  stopCamera();
  const product = PRODUCTS[code];
  if (product) {
    beep('ok');
    showResultFound(product);
    addToCart(product);
    setMode('received');
    if (navigator.vibrate) navigator.vibrate(100);
    // 連続スキャンできるよう少し待ってカメラ再起動
    setTimeout(() => startCamera(), 800);
  } else {
    beep('ng');
    showResultNotFound(code);
  }
  renderCart();
  renderSummary();
}

function showResultFound(p) {
  document.getElementById('result-idle').style.display = 'none';
  document.getElementById('result-notfound').style.display = 'none';
  document.getElementById('result-found').style.display = 'block';
  document.getElementById('res-name').textContent = p.name;
  document.getElementById('res-model').textContent = '型式: ' + p.model;
  document.getElementById('res-price').textContent = '¥' + p.price.toLocaleString();
}

let unknownCode = '';

function showResultNotFound(code) {
  unknownCode = code;
  document.getElementById('result-idle').style.display = 'none';
  document.getElementById('result-found').style.display = 'none';
  document.getElementById('result-notfound').style.display = 'block';
  document.getElementById('res-code').textContent = 'コード: ' + code;
}

function addUnknownItem(price) {
  if (price === null) {
    // その他：手入力モードへ切り替え
    setMode('manual');
    document.getElementById('result-idle').style.display = 'flex';
    document.getElementById('result-notfound').style.display = 'none';
    return;
  }
  // 価格設定の一括変更を反映
  const sellPrice = priceSettings[price] !== undefined ? priceSettings[price] : price;
  const item = {
    jan: 'unknown_' + Date.now(),
    name: '未登録商品',
    model: unknownCode,
    price: sellPrice,
    qty: 1
  };
  cart.push(item);
  beep('ok');
  if (navigator.vibrate) navigator.vibrate(100);
  document.getElementById('result-idle').style.display = 'flex';
  document.getElementById('result-notfound').style.display = 'none';
  setMode('received');
  renderCart();
  renderSummary();
}

// ===== CART =====
function addToCart(product) {
  // 価格設定に応じた販売価格を適用
  const sellPrice = priceSettings[product.price] !== undefined ? priceSettings[product.price] : product.price;
  const janKey = String(product.jan);
  const idx = cart.findIndex(i => String(i.jan) === janKey);
  if (idx >= 0) {
    cart[idx].qty++;
  } else {
    cart.push({ jan: janKey, name: product.name, model: product.model, price: sellPrice, qty: 1 });
  }
}

function startPriceEdit(jan) {
  const idx = cart.findIndex(i => i.jan === jan);
  if (idx < 0) return;
  const item = cart[idx];
  const subtotalEl = document.getElementById('subtotal-' + jan);
  const unitEl = document.getElementById('unit-' + jan);
  if (!subtotalEl) return;
  // インライン入力欄に差し替え
  subtotalEl.innerHTML = `<input class="price-input" id="price-input-${jan}" type="number" value="${item.price}" min="0" inputmode="numeric">`;
  unitEl.textContent = '（金額を編集中）';
  const input = document.getElementById('price-input-' + jan);
  input.focus();
  input.select();
  const commit = () => {
    const newPrice = parseInt(input.value) || 0;
    cart[idx].price = newPrice;
    renderCart();
    renderSummary();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { input.blur(); } });
}

function removeFromCart(jan) {
  cart = cart.filter(i => i.jan !== jan);
  renderCart(); renderSummary();
}

function changeQty(jan, delta) {
  const idx = cart.findIndex(i => i.jan === jan);
  if (idx < 0) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  renderCart(); renderSummary();
}

function renderCart() {
  const list = document.getElementById('cart-list');
  const empty = document.getElementById('empty-msg');
  if (cart.length === 0) {
    list.innerHTML = '';
    list.appendChild(empty);
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = '';
  cart.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'cart-item';

    // 商品情報
    const info = document.createElement('div');
    info.className = 'cart-item-info';
    const nameEl = document.createElement('div');
    nameEl.className = 'cart-item-name';
    nameEl.textContent = item.name;
    const unitEl = document.createElement('div');
    unitEl.className = 'cart-item-unit';
    unitEl.textContent = '¥' + item.price.toLocaleString() + ' × ' + item.qty;
    info.appendChild(nameEl);
    info.appendChild(unitEl);

    // 数量コントロール
    const qtyCtrl = document.createElement('div');
    qtyCtrl.className = 'qty-controls';

    const minusBtn = document.createElement('button');
    minusBtn.className = 'qty-btn minus';
    minusBtn.textContent = '−';
    minusBtn.addEventListener('click', function(){ changeQtyByIdx(idx, -1); });

    const qtySpan = document.createElement('span');
    qtySpan.className = 'qty-num';
    qtySpan.textContent = item.qty;

    const plusBtn = document.createElement('button');
    plusBtn.className = 'qty-btn plus';
    plusBtn.textContent = '＋';
    plusBtn.addEventListener('click', function(){ changeQtyByIdx(idx, 1); });

    qtyCtrl.appendChild(minusBtn);
    qtyCtrl.appendChild(qtySpan);
    qtyCtrl.appendChild(plusBtn);

    // 小計・編集
    const right = document.createElement('div');
    right.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;';
    const subtotalEl = document.createElement('div');
    subtotalEl.className = 'cart-item-subtotal';
    subtotalEl.textContent = '¥' + (item.price * item.qty).toLocaleString();
    const editBtn = document.createElement('button');
    editBtn.className = 'price-edit-btn';
    editBtn.textContent = '編集';
    editBtn.addEventListener('touchstart', function(e){ e.preventDefault(); startPriceEditByIdx(idx); }, {passive:false});
    editBtn.addEventListener('click', function(){ startPriceEditByIdx(idx); });
    right.appendChild(subtotalEl);
    right.appendChild(editBtn);

    row.appendChild(info);
    row.appendChild(qtyCtrl);
    row.appendChild(right);
    list.appendChild(row);
  });
}

function changeQtyByIdx(idx, delta) {
  if (idx < 0 || idx >= cart.length) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  // 直接DOMを書き換えてみる（renderCartを使わず）
  const list = document.getElementById('cart-list');
  alert('list=' + (list ? 'OK' : 'NULL') + ' children=' + (list ? list.children.length : '?'));
  renderCart();
  renderSummary();
}

function initCartEvents() {} // 不要（グローバル関数で対応）

function startPriceEditByIdx(idx) {
  if (idx < 0 || idx >= cart.length) return;
  const item = cart[idx];
  const subtotalEl = document.getElementById('subtotal-idx-' + idx);
  if (!subtotalEl) return;
  subtotalEl.innerHTML = `<input class="price-input" id="price-input-idx-${idx}" type="number" value="${item.price}" min="0" inputmode="numeric">`;
  const input = document.getElementById('price-input-idx-' + idx);
  input.focus();
  input.select();
  let committed = false;
  const commit = () => {
    if (committed) return;
    committed = true;
    cart[idx].price = parseInt(input.value) || 0;
    renderCart();
    renderSummary();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
}

function setTax(rate) {
  taxRate = rate;
  [0, 10].forEach(r => {
    const btn = document.getElementById('tax-btn-' + r);
    if (btn) btn.style.background = r === rate ? '#0d9488' : '#f1f5f9';
    if (btn) btn.style.color = r === rate ? 'white' : '#0f172a';
  });
  const taxRow = document.getElementById('tax-row');
  if (taxRow) taxRow.style.display = rate === 0 ? 'none' : 'flex';
  const taxLabel = document.getElementById('tax-label');
  if (taxLabel) taxLabel.textContent = '消費税（' + rate + '%）';
  renderSummary();
}

function renderSummary() {
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const tax = Math.floor(subtotal * taxRate / 100);
  const total = subtotal + tax;
  const received = parseInt(receivedAmount) || 0;
  const change = received - total;

  document.getElementById('subtotal').textContent = '¥' + subtotal.toLocaleString();
  document.getElementById('tax').textContent = '¥' + tax.toLocaleString();
  document.getElementById('total').textContent = '¥' + total.toLocaleString();

  const recDisp = document.getElementById('received-display');
  recDisp.textContent = '¥' + (receivedAmount || '0');
  recDisp.className = 'received-val' + (mode === 'received' ? ' active' : '');

  const changeBox = document.getElementById('change-box');
  if (received > 0) {
    changeBox.style.display = 'block';
    changeBox.className = change >= 0 ? '' : 'negative';
    const ca = document.getElementById('change-amount');
    ca.textContent = '¥' + change.toLocaleString();
    ca.className = 'change-amount ' + (change >= 0 ? 'positive' : 'negative');
  } else {
    changeBox.style.display = 'none';
  }
  document.getElementById('btn-checkout').disabled = cart.length === 0;
}

function clearCart() {
  cart = []; receivedAmount = ''; janInput = ''; manualPrice = '';
  setMode('jan');
  document.getElementById('result-idle').style.display = 'flex';
  document.getElementById('result-found').style.display = 'none';
  document.getElementById('result-notfound').style.display = 'none';
  renderCart(); renderSummary(); renderInputDisplay();
}

// ===== CHECKOUT =====
function checkout() {
  if (cart.length === 0) return;
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const tax = Math.floor(subtotal * taxRate / 100);
  const total = subtotal + tax;
  const received = parseInt(receivedAmount) || 0;
  const now = new Date();
  const record = {
    datetime: now.toLocaleString('ja-JP'),
    items: cart.map(i => ({ name: i.name, model: i.model, price: i.price, qty: i.qty, subtotal: i.price * i.qty })),
    subtotal, tax, total, received, change: received - total
  };
  salesLog.push(record);
  try { localStorage.setItem('salesLog', JSON.stringify(salesLog)); } catch(e) {}
  clearCart();
}

// ===== NUMPAD =====
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.mode-tab.' + m).classList.add('active');
  document.getElementById('manual-form').style.display = m === 'manual' ? 'block' : 'none';
  if (m === 'manual') { manualPrice = ''; renderManualPrice(); }
  renderInputDisplay();
  renderSummary();
}

function renderManualPrice() {
  const el = document.getElementById('manual-price-display');
  if (el) el.textContent = '¥' + (manualPrice || '0');
}

function addManualItem() {
  const name = document.getElementById('manual-name').value.trim();
  const price = parseInt(manualPrice) || 0;
  if (!name) { alert('商品名を入力してください'); return; }
  if (price <= 0) { alert('金額を入力してください'); return; }
  const item = { jan: 'manual_' + Date.now(), name: name, model: '', price: price, qty: 1 };
  cart.push(item);
  document.getElementById('manual-name').value = '';
  manualPrice = '';
  renderManualPrice();
  renderCart();
  renderSummary();
  setMode('received');
}

function numKey(key) {
  if (mode === 'jan') {
    if (key === 'C') janInput = '';
    else if (key === '⌫') janInput = janInput.slice(0, -1);
    else janInput += key;
  } else if (mode === 'manual') {
    if (key === 'C') manualPrice = '';
    else if (key === '⌫') manualPrice = manualPrice.slice(0, -1);
    else {
      if (manualPrice === '0') manualPrice = key;
      else manualPrice += key;
    }
    renderManualPrice();
  } else {
    if (key === 'C') receivedAmount = '';
    else if (key === '⌫') receivedAmount = receivedAmount.slice(0, -1);
    else {
      if (receivedAmount === '0') receivedAmount = key;
      else receivedAmount += key;
    }
    renderSummary();
  }
  renderInputDisplay();
}

function renderInputDisplay() {
  const disp = document.getElementById('input-display');
  const enterBtn = document.getElementById('btn-enter');
  if (mode === 'jan') {
    if (janInput) {
      disp.textContent = janInput;
      disp.className = 'input-val';
      enterBtn.style.display = 'block';
    } else {
      disp.textContent = 'JANコードを入力';
      disp.className = 'input-val placeholder';
      enterBtn.style.display = 'none';
    }
  } else if (mode === 'manual') {
    disp.textContent = '商品名と金額を入力';
    disp.className = 'input-val placeholder';
    enterBtn.style.display = 'none';
  } else {
    disp.textContent = '¥' + (receivedAmount || '0');
    disp.className = 'input-val';
    enterBtn.style.display = 'none';
  }
}

function submitJAN() {
  if (!janInput) return;
  handleScannedCode(janInput);
  janInput = '';
  renderInputDisplay();
}

// ===== SALES MODAL =====
function openSalesModal() {
  document.getElementById('modal-overlay').classList.add('open');
  renderSalesModal();
}
function closeSalesModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function renderSalesModal() {
  const el = document.getElementById('modal-list');
  if (salesLog.length === 0) {
    el.innerHTML = '<p style="color:#94a3b8;font-size:13px;padding:8px 0">まだ売上がありません</p>';
    return;
  }
  const total = salesLog.reduce((s, r) => s + r.total, 0);
  el.innerHTML = `
    <p style="font-size:13px;margin-bottom:8px">件数: <b>${salesLog.length}件</b>　合計売上: <b style="color:#0d9488">¥${total.toLocaleString()}</b></p>
    <table>
      <thead><tr><th>日時</th><th>合計</th><th>預かり</th><th>お釣り</th></tr></thead>
      <tbody>
        ${salesLog.map(r => `<tr>
          <td>${r.datetime}</td>
          <td>¥${r.total.toLocaleString()}</td>
          <td>¥${r.received.toLocaleString()}</td>
          <td style="color:${r.change>=0?'#22c55e':'#ef4444'}">¥${r.change.toLocaleString()}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function exportCSV() {
  if (salesLog.length === 0) { alert('売上データがありません'); return; }
  const rows = [['日時','商品名','型式','単価','数量','小計','合計（税込）','預かり金','お釣り']];
  salesLog.forEach(r => {
    r.items.forEach((item, idx) => {
      rows.push([
        idx === 0 ? r.datetime : '',
        item.name, item.model, item.price, item.qty, item.subtotal,
        idx === 0 ? r.total : '',
        idx === 0 ? r.received : '',
        idx === 0 ? r.change : ''
      ]);
    });
  });
  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `売上_${today}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ===== INIT =====
renderCart();
renderSummary();
renderInputDisplay();
initCartEvents();
