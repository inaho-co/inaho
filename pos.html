<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>POSレジ</title>
<!-- ZXingを最初から読み込む -->
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --indigo: #4f46e5;
    --teal: #0d9488;
    --red: #ef4444;
    --green: #22c55e;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: #e2e8f0;
    --text: #0f172a;
    --text2: #64748b;
    --text3: #94a3b8;
  }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, 'Hiragino Sans', sans-serif; background: var(--surface2); color: var(--text); }
  #app { display: flex; height: 100vh; height: 100dvh; overflow: hidden; }

  /* CART PANEL */
  #cart-panel { display: flex; flex-direction: column; width: 52%; border-right: 1px solid var(--border); background: var(--surface); }
  .panel-header { display: flex; align-items: center; gap: 8px; padding: 12px 16px; color: white; font-weight: 700; font-size: 15px; flex-shrink: 0; }
  #cart-header { background: var(--teal); }
  #scan-header { background: var(--indigo); }
  .panel-header .spacer { flex: 1; }
  .btn-sm { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 12px; padding: 4px 8px; border-radius: 6px; cursor: pointer; }

  #cart-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .empty-cart { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--text3); }
  .empty-cart svg { width: 48px; height: 48px; }
  .cart-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-model { font-size: 11px; color: var(--text2); }
  .cart-item-unit { font-size: 11px; color: var(--text2); }
  .qty-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .qty-btn { width: 28px; height: 28px; border: none; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .qty-btn.minus { background: #fee2e2; color: var(--red); }
  .qty-btn.plus { background: #ccfbf1; color: var(--teal); }
  .qty-num { font-size: 14px; font-weight: 700; min-width: 24px; text-align: center; }
  .cart-item-subtotal { font-size: 13px; font-weight: 700; min-width: 64px; text-align: right; flex-shrink: 0; }

  #summary { flex-shrink: 0; padding: 10px 12px; background: var(--surface2); border-top: 1px solid var(--border); }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 13px; }
  .summary-row.total { font-size: 16px; font-weight: 700; padding: 6px 0; border-top: 1px solid var(--border); margin-top: 4px; }
  .summary-row.total span:last-child { color: var(--teal); }
  .summary-row .label { color: var(--text2); }
  .received-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; cursor: pointer; }
  .received-row .label { font-size: 13px; font-weight: 600; color: var(--text2); }
  .received-val { font-size: 16px; font-weight: 700; }
  .received-val.active { color: var(--teal); }
  #change-box { display: none; background: #f0fdf4; border-radius: 10px; padding: 8px 12px; margin-top: 6px; }
  #change-box.negative { background: #fef2f2; }
  .change-label { font-size: 13px; font-weight: 700; }
  .change-amount { font-size: 22px; font-weight: 800; }
  .change-amount.positive { color: var(--green); }
  .change-amount.negative { color: var(--red); }
  #btn-checkout { width: 100%; padding: 14px; background: var(--teal); color: white; font-size: 15px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  #btn-checkout:disabled { background: var(--text3); cursor: not-allowed; }

  /* SCAN PANEL */
  #scan-panel { display: flex; flex-direction: column; width: 48%; background: var(--surface); overflow: hidden; }
  #camera-area { position: relative; height: 180px; flex-shrink: 0; background: #000; overflow: hidden; }
  #camera-video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #camera-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; }
  #btn-scan-start { display: flex; flex-direction: column; align-items: center; gap: 8px; color: white; background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 700; }
  #btn-scan-start svg { width: 40px; height: 40px; }
  #btn-scan-cancel { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 8px; padding: 8px 20px; font-size: 13px; font-weight: 700; cursor: pointer; display: none; }
  #scan-status { font-size: 11px; color: rgba(255,255,255,0.9); position: absolute; top: 6px; left: 8px; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px; }
  #debug-box { font-size: 11px; color: #64748b; padding: 4px 8px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; min-height: 20px; }
  #ver-box { position: fixed; top: 0; left: 0; z-index: 9999; font-size: 10px; color: white; background: rgba(0,0,0,0.75); padding: 3px 7px; border-radius: 0 0 6px 0; line-height: 1.6; pointer-events: none; }

  #scan-result { padding: 10px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); flex-shrink: 0; min-height: 70px; }
  .result-idle { color: var(--text3); font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .result-found { display: none; }
  .result-found .badge { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 2px; }
  .result-found .prod-name { font-size: 15px; font-weight: 700; }
  .result-found .prod-model { font-size: 12px; color: var(--text2); }
  .result-found .prod-price { font-size: 18px; font-weight: 800; color: var(--indigo); }
  .result-notfound { display: none; }
  .result-notfound .badge { font-size: 12px; font-weight: 700; color: var(--red); }
  .result-notfound .code { font-size: 12px; color: var(--text2); }

  #numpad-area { flex: 1; padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
  .mode-tabs { display: flex; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .mode-tab { flex: 1; padding: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
  .mode-tab.jan { background: var(--surface2); color: var(--text); }
  .mode-tab.jan.active { background: var(--indigo); color: white; }
  .mode-tab.received { background: var(--surface2); color: var(--text); }
  .mode-tab.received.active { background: var(--teal); color: white; }
  .input-display { display: flex; align-items: center; gap: 8px; padding: 4px 2px; flex-shrink: 0; }
  .input-val { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .input-val.placeholder { color: var(--text3); font-weight: 400; }
  #btn-enter { background: var(--indigo); color: white; border: none; border-radius: 8px; padding: 6px 10px; cursor: pointer; flex-shrink: 0; }
  #btn-enter svg { width: 18px; height: 18px; display: block; }
  .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; flex: 1; }
  .np-btn { border: none; border-radius: 8px; background: var(--surface2); font-size: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .np-btn:active { background: #cbd5e1; }
  .np-btn.clear { background: #fee2e2; color: var(--red); }
  .np-btn.clear:active { background: #fca5a5; }

  /* MODAL */
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  #modal-overlay.open { display: flex; }
  #modal { background: white; border-radius: 16px; padding: 20px; width: 90%; max-width: 480px; max-height: 80vh; display: flex; flex-direction: column; gap: 12px; }
  #modal h2 { font-size: 18px; font-weight: 800; }
  #modal-list { flex: 1; overflow-y: auto; font-size: 13px; }
  #modal-list table { width: 100%; border-collapse: collapse; }
  #modal-list th { text-align: left; padding: 6px 4px; border-bottom: 2px solid var(--border); font-size: 12px; color: var(--text2); }
  #modal-list td { padding: 5px 4px; border-bottom: 1px solid var(--border); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
  #btn-export { background: var(--indigo); color: white; }
  #btn-modal-close { background: var(--surface2); color: var(--text); }
</style>
</head>
<body>
<div id="ver-box">読込中...</div>
<div id="app">
  <!-- LEFT: Cart Panel -->
  <div id="cart-panel">
    <div class="panel-header" id="cart-header">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      会計
      <span class="spacer"></span>
      <button class="btn-sm" onclick="openSalesModal()">売上履歴</button>
      &nbsp;
      <button class="btn-sm" onclick="clearCart()">クリア</button>
    </div>
    <div id="cart-list">
      <div class="empty-cart" id="empty-msg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span>商品をスキャンしてください</span>
      </div>
    </div>
    <div id="summary">
      <div class="summary-row"><span class="label">小計（税抜）</span><span id="subtotal">¥0</span></div>
      <div class="summary-row"><span class="label">消費税（10%）</span><span id="tax">¥0</span></div>
      <div class="summary-row total"><span>合計（税込）</span><span id="total">¥0</span></div>
      <div class="received-row" onclick="setMode('received')">
        <span class="label">預かり金</span>
        <span class="received-val" id="received-display">¥0</span>
      </div>
      <div id="change-box">
        <div class="change-label">お釣り</div>
        <div class="change-amount" id="change-amount">¥0</div>
      </div>
      <button id="btn-checkout" disabled onclick="checkout()">
        会計完了・次の客へ
      </button>
    </div>
  </div>

  <!-- RIGHT: Scan Panel -->
  <div id="scan-panel">
    <div class="panel-header" id="scan-header">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9V6a2 2 0 0 1 2-2h3M15 4h3a2 2 0 0 1 2 2v3M21 15v3a2 2 0 0 1-2 2h-3M9 20H6a2 2 0 0 1-2-2v-3"/><rect x="7" y="7" width="10" height="10"/></svg>
      バーコードスキャン
    </div>

    <div id="camera-area">
      <video id="camera-video" autoplay playsinline muted></video>
      <div id="camera-overlay">
        <button id="btn-scan-start" onclick="startCamera()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9V6a2 2 0 0 1 2-2h3M15 4h3a2 2 0 0 1 2 2v3M21 15v3a2 2 0 0 1-2 2h-3M9 20H6a2 2 0 0 1-2-2v-3"/><rect x="7" y="7" width="10" height="10"/></svg>
          スキャン開始
        </button>
      </div>
      <span id="scan-status"></span>
      <button id="btn-scan-cancel" onclick="stopCamera()">キャンセル</button>
    </div>

    <div id="scan-result">
      <div class="result-idle" id="result-idle">
        スキャンしてください
      </div>
      <div class="result-found" id="result-found">
        <div class="badge">✓ 追加しました</div>
        <div class="prod-name" id="res-name"></div>
        <div class="prod-model" id="res-model"></div>
        <div class="prod-price" id="res-price"></div>
      </div>
      <div class="result-notfound" id="result-notfound">
        <div class="badge">✗ 見つかりません</div>
        <div class="code" id="res-code"></div>
      </div>
    </div>

    <div id="numpad-area">
      <div class="mode-tabs">
        <button class="mode-tab jan active" onclick="setMode('jan')">JANコード</button>
        <button class="mode-tab received" onclick="setMode('received')">預かり金</button>
      </div>
      <div class="input-display">
        <span class="input-val placeholder" id="input-display">JANコードを入力</span>
        <button id="btn-enter" onclick="submitJAN()" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
        </button>
      </div>
      <div class="numpad-grid">
        <button class="np-btn" onclick="numKey('7')">7</button>
        <button class="np-btn" onclick="numKey('8')">8</button>
        <button class="np-btn" onclick="numKey('9')">9</button>
        <button class="np-btn" onclick="numKey('4')">4</button>
        <button class="np-btn" onclick="numKey('5')">5</button>
        <button class="np-btn" onclick="numKey('6')">6</button>
        <button class="np-btn" onclick="numKey('1')">1</button>
        <button class="np-btn" onclick="numKey('2')">2</button>
        <button class="np-btn" onclick="numKey('3')">3</button>
        <button class="np-btn clear" onclick="numKey('C')">C</button>
        <button class="np-btn" onclick="numKey('0')">0</button>
        <button class="np-btn" onclick="numKey('⌫')">⌫</button>
      </div>
    </div>
  </div>
</div>

<!-- Sales Modal -->
<div id="modal-overlay" onclick="if(event.target===this)closeSalesModal()">
  <div id="modal">
    <h2>本日の売上履歴</h2>
    <div id="modal-list"><p style="color:#94a3b8;font-size:13px">まだ売上がありません</p></div>
    <div class="modal-btns">
      <button id="btn-export" onclick="exportCSV()">CSVで出力</button>
      <button id="btn-modal-close" onclick="closeSalesModal()">閉じる</button>
    </div>
  </div>
</div>

let cart = [];

let cameraStream = null;
let lastScanTime = 0;

// ===== CAMERA =====
async function startCamera() {
  document.getElementById('scan-status').textContent = '起動中...';
  try {
    // まず背面カメラ指定で試す
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: 'environment' } }
      });
    } catch(e) {
      // 失敗したら制限なしで試す
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
    }
    cameraStream = stream;
    const video = document.getElementById('camera-video');
    video.srcObject = stream;
    await video.play();
    document.getElementById('camera-overlay').style.display = 'none';
    document.getElementById('btn-scan-cancel').style.display = 'block';
    document.getElementById('scan-status').textContent = 'スキャン中...';
    startZXing(video);
  } catch(e) {
    document.getElementById('scan-status').textContent = '';
    alert('カメラエラー\n名前:' + e.name + '\n内容:' + e.message + '\nコード:' + e.code);
  }
}

function startZXing(video) {
  if (!window.ZXing) {
    document.getElementById('scan-status').textContent = 'ZXing読込失敗';
    return;
  }
  const hints = new Map();
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  const codeReader = new ZXing.BrowserMultiFormatReader(hints);
  window._zxingReader = codeReader;

  // canvasを使って定期的にフレームをデコード
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  let running = true;
  window._zxingStop = () => { running = false; };

  function tick() {
    if (!running) return;
    try {
      if (video.readyState >= 2 && video.videoWidth > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const result = codeReader.decodeFromCanvas(canvas);
        if (result) {
          const now = Date.now();
          if (now - lastScanTime > 1500) {
            lastScanTime = now;
            handleScannedCode(result.getText());
            return;
          }
        }
      } else {
        document.getElementById('scan-status').textContent = '待機中 readyState:' + video.readyState + ' w:' + video.videoWidth;
      }
    } catch(e) {
      // NotFoundException以外はデバッグ表示
      if (e && e.name !== 'NotFoundException') {
        document.getElementById('debug-box').textContent = 'ERR:' + e.name + ' ' + e.message;
      }
    }
    setTimeout(tick, 150);
  }
  tick();
}

function stopCamera() {
  if (window._zxingStop) { window._zxingStop(); window._zxingStop = null; }
  if (window._zxingReader) {
    try { window._zxingReader.reset(); } catch(e) {}
    window._zxingReader = null;
  }
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  const video = document.getElementById('camera-video');
  video.srcObject = null;
  document.getElementById('camera-overlay').style.display = 'flex';
  document.getElementById('btn-scan-cancel').style.display = 'none';
  document.getElementById('scan-status').textContent = '';
}

// ===== SCAN LOGIC =====
function handleScannedCode(code) {
  stopCamera();
  const product = PRODUCTS[code];
  if (product) {
    showResultFound(product);
    addToCart(product);
    setMode('received');
    if (navigator.vibrate) navigator.vibrate(100);
  } else {
    showResultNotFound(code);
  }
  renderCart();
  renderSummary();
}

function showResultFound(p) {
  document.getElementById('result-idle').style.display = 'none';
  document.getElementById('result-notfound').style.display = 'none';
  document.getElementById('result-found').style.display = 'block';
  document.getElementById('res-name').textContent = p.name;
  document.getElementById('res-model').textContent = '型式: ' + p.model;
  document.getElementById('res-price').textContent = '¥' + p.price.toLocaleString();
}

function showResultNotFound(code) {
  document.getElementById('result-idle').style.display = 'none';
  document.getElementById('result-found').style.display = 'none';
  document.getElementById('result-notfound').style.display = 'block';
  document.getElementById('res-code').textContent = 'コード: ' + code;
}

// ===== CART =====
function addToCart(product) {
  const idx = cart.findIndex(i => i.jan === product.jan);
  if (idx >= 0) cart[idx].qty++;
  else cart.push({ jan: product.jan, name: product.name, model: product.model, price: product.price, qty: 1 });
}

function removeFromCart(jan) {
  cart = cart.filter(i => i.jan !== jan);
  renderCart(); renderSummary();
}

function changeQty(jan, delta) {
  const idx = cart.findIndex(i => i.jan === jan);
  if (idx < 0) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  renderCart(); renderSummary();
}

function renderCart() {
  const list = document.getElementById('cart-list');
  const empty = document.getElementById('empty-msg');
  if (cart.length === 0) {
    list.innerHTML = '';
    list.appendChild(empty);
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-model">${item.model}</div>
        <div class="cart-item-unit">¥${item.price.toLocaleString()} × ${item.qty}</div>
      </div>
      <div class="qty-controls">
        <button class="qty-btn minus" onclick="changeQty('${item.jan}',-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn plus" onclick="changeQty('${item.jan}',1)">＋</button>
      </div>
      <div class="cart-item-subtotal">¥${(item.price * item.qty).toLocaleString()}</div>
    </div>
  `).join('');
}

function renderSummary() {
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const tax = Math.floor(subtotal * 0.1);
  const total = subtotal + tax;
  const received = parseInt(receivedAmount) || 0;
  const change = received - total;

  document.getElementById('subtotal').textContent = '¥' + subtotal.toLocaleString();
  document.getElementById('tax').textContent = '¥' + tax.toLocaleString();
  document.getElementById('total').textContent = '¥' + total.toLocaleString();

  const recDisp = document.getElementById('received-display');
  recDisp.textContent = '¥' + (receivedAmount || '0');
  recDisp.className = 'received-val' + (mode === 'received' ? ' active' : '');

  const changeBox = document.getElementById('change-box');
  if (received > 0) {
    changeBox.style.display = 'block';
    changeBox.className = change >= 0 ? '' : 'negative';
    const ca = document.getElementById('change-amount');
    ca.textContent = '¥' + change.toLocaleString();
    ca.className = 'change-amount ' + (change >= 0 ? 'positive' : 'negative');
  } else {
    changeBox.style.display = 'none';
  }
  document.getElementById('btn-checkout').disabled = cart.length === 0;
}

function clearCart() {
  cart = []; receivedAmount = ''; janInput = '';
  setMode('jan');
  document.getElementById('result-idle').style.display = 'flex';
  document.getElementById('result-found').style.display = 'none';
  document.getElementById('result-notfound').style.display = 'none';
  renderCart(); renderSummary(); renderInputDisplay();
}

// ===== CHECKOUT =====
function checkout() {
  if (cart.length === 0) return;
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const tax = Math.floor(subtotal * 0.1);
  const total = subtotal + tax;
  const received = parseInt(receivedAmount) || 0;
  const now = new Date();
  const record = {
    datetime: now.toLocaleString('ja-JP'),
    items: cart.map(i => ({ name: i.name, model: i.model, price: i.price, qty: i.qty, subtotal: i.price * i.qty })),
    subtotal, tax, total, received, change: received - total
  };
  salesLog.push(record);
  try { localStorage.setItem('salesLog', JSON.stringify(salesLog)); } catch(e) {}
  clearCart();
}

// ===== NUMPAD =====
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.mode-tab.' + m).classList.add('active');
  renderInputDisplay();
  renderSummary();
}

function numKey(key) {
  if (mode === 'jan') {
    if (key === 'C') janInput = '';
    else if (key === '⌫') janInput = janInput.slice(0, -1);
    else janInput += key;
  } else {
    if (key === 'C') receivedAmount = '';
    else if (key === '⌫') receivedAmount = receivedAmount.slice(0, -1);
    else {
      if (receivedAmount === '0') receivedAmount = key;
      else receivedAmount += key;
    }
    renderSummary();
  }
  renderInputDisplay();
}

function renderInputDisplay() {
  const disp = document.getElementById('input-display');
  const enterBtn = document.getElementById('btn-enter');
  if (mode === 'jan') {
    if (janInput) {
      disp.textContent = janInput;
      disp.className = 'input-val';
      enterBtn.style.display = 'block';
    } else {
      disp.textContent = 'JANコードを入力';
      disp.className = 'input-val placeholder';
      enterBtn.style.display = 'none';
    }
  } else {
    disp.textContent = '¥' + (receivedAmount || '0');
    disp.className = 'input-val';
    enterBtn.style.display = 'none';
  }
}

function submitJAN() {
  if (!janInput) return;
  handleScannedCode(janInput);
  janInput = '';
  renderInputDisplay();
}

// ===== SALES MODAL =====
function openSalesModal() {
  document.getElementById('modal-overlay').classList.add('open');
  renderSalesModal();
}
function closeSalesModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function renderSalesModal() {
  const el = document.getElementById('modal-list');
  if (salesLog.length === 0) {
    el.innerHTML = '<p style="color:#94a3b8;font-size:13px;padding:8px 0">まだ売上がありません</p>';
    return;
  }
  const total = salesLog.reduce((s, r) => s + r.total, 0);
  el.innerHTML = `
    <p style="font-size:13px;margin-bottom:8px">件数: <b>${salesLog.length}件</b>　合計売上: <b style="color:#0d9488">¥${total.toLocaleString()}</b></p>
    <table>
      <thead><tr><th>日時</th><th>合計</th><th>預かり</th><th>お釣り</th></tr></thead>
      <tbody>
        ${salesLog.map(r => `<tr>
          <td>${r.datetime}</td>
          <td>¥${r.total.toLocaleString()}</td>
          <td>¥${r.received.toLocaleString()}</td>
          <td style="color:${r.change>=0?'#22c55e':'#ef4444'}">¥${r.change.toLocaleString()}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function exportCSV() {
  if (salesLog.length === 0) { alert('売上データがありません'); return; }
  const rows = [['日時','商品名','型式','単価','数量','小計','合計（税込）','預かり金','お釣り']];
  salesLog.forEach(r => {
    r.items.forEach((item, idx) => {
      rows.push([
        idx === 0 ? r.datetime : '',
        item.name, item.model, item.price, item.qty, item.subtotal,
        idx === 0 ? r.total : '',
        idx === 0 ? r.received : '',
        idx === 0 ? r.change : ''
      ]);
    });
  });
  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `売上_${today}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// デバッグ情報を画面に表示
(async () => {
  const ua = navigator.userAgent;
  const ios = ua.match(/OS (\d+_\d+)/);
  const iosVer = ios ? ios[1].replace('_', '.') : '不明';
  const zxingOk = typeof ZXing !== 'undefined' ? '✅OK' : '❌なし';
  const bdOk = 'BarcodeDetector' in window ? '✅あり' : '❌なし';
  const camOk = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) ? '✅あり' : '❌なし';
  let formats = '-';
  if ('BarcodeDetector' in window) {
    try { const f = await BarcodeDetector.getSupportedFormats(); formats = f.join(', '); } catch(e) { formats = 'エラー'; }
  }
  const ver = document.getElementById('ver-box');
  if (ver) {
    ver.innerHTML = 'v4 iOS:' + iosVer + ' ZXing:' + zxingOk + ' BD:' + bdOk + '<br>対応形式: ' + formats;
  }
  const dbg = document.getElementById('debug-box');
  if (dbg) {
    dbg.innerHTML =
      'iOS:' + iosVer + ' ZXing:' + zxingOk + ' BarcodeDetector:' + bdOk + ' Camera:' + camOk + '<br>対応形式: ' + formats;
  }
})();
